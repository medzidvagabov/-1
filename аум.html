<style>

.sidebar-backdrop.active{opacity:1;pointer-events:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;margin:2px 12px;border-radius:12px;cursor:pointer;transition:all .2s;color:#64748B;font-weight:500;font-size:14.5px}

.table-row{transition:background .15s}

.toast.success{background:#059669}.toast.error{background:#DC2626}.toast.info{background:#2563EB}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function toast(msg,type='info'){
  const d=document.createElement('div');d.className=`toast ${type}`;
  d.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i><span>${msg}</span>`;
  $('#toastBox').appendChild(d);
  setTimeout(()=>{d.style.animation='slideOut .4s ease forwards';setTimeout(()=>d.remove(),400)},3000);
}

function getGroup(id){return DB.groups.find(g=>g.id===id)}
function getDisc(id){return DB.disciplines.find(d=>d.id===id)}
function roomsByBuilding(bid,floor){return DB.rooms.filter(r=>r.buildingId===bid&&(!floor||r.floor===floor))}

function animateCounters(){
  $$('.counter-anim').forEach(el=>{
    const target=parseFloat(el.dataset.target);
    const suffix=el.dataset.suffix||'';const prefix=el.dataset.prefix||'';
    let current=0;const step=target/40;
    const timer=setInterval(()=>{current+=step;if(current>=target){current=target;clearInterval(timer)}el.textContent=prefix+Math.round(current)+suffix;},30);
  });
}

function generateSchedule(){
  DB.events=[];let eventId=1;const allSlots=[];
  for(let d=0;d<6;d++) for(let s=0;s<6;s++) allSlots.push({day:d,slot:s+1});
  DB.groupDisciplines.forEach(gd=>{
    const disc=getDisc(gd.disciplineId);const teacher=getTeacher(disc.teacherId);
    if(!disc||!teacher) return;
    const pairsPerWeek=Math.max(1,Math.round(disc.hours/17));let assigned=0;
    const shuffled=[...allSlots].sort(()=>Math.random()-0.5);
    for(const sl of shuffled){
      if(assigned>=pairsPerWeek) break;
      if(teacher.restrictions.includes(sl.slot)) continue;
      if(DB.events.find(e=>e.teacherId===teacher.id&&e.day===sl.day&&e.slot===sl.slot)) continue;
      if(DB.events.find(e=>e.groupId===gd.groupId&&e.day===sl.day&&e.slot===sl.slot)) continue;
      const group=getGroup(gd.groupId);let room=null;
      const candidates=DB.rooms.filter(r=>r.capacity>=group.students);
      const typeMatch=candidates.filter(r=>{if(disc.type==='lecture') return r.type==='lecture';if(disc.type==='lab') return r.type==='lab'||r.type==='computer';return true;});
      const pool=typeMatch.length?typeMatch:candidates;
      room=pool.find(r=>!DB.events.find(e=>e.roomId===r.id&&e.day===sl.day&&e.slot===sl.slot));
      const conflict=!room;if(!room) room=DB.rooms[Math.floor(Math.random()*DB.rooms.length)];
      DB.events.push({id:eventId++,day:sl.day,slot:sl.slot,roomId:room.id,teacherId:teacher.id,groupId:gd.groupId,disciplineId:disc.id,type:disc.type,conflict,held:false});
      assigned++;
    }
  });
  State.scheduleGenerated=true;
}

/* ========== КОНСТРУКТОР РАСПИСАНИЯ ========== */
function renderSchedule(){
  const files=State.uploadedFiles;
  return `<div class="space-y-6">
    <div class="card p-5 sm:p-6 fade-up"><h3 class="text-lg font-700 mb-4">Загрузка данных</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">${[{key:'plans',label:'Учебные планы',icon:'fa-file-alt',hint:'Формат: .xlsx, .csv'},{key:'rooms',label:'Аудитории',icon:'fa-building',hint:'Формат: .xlsx, .csv'},{key:'restrictions',label:'Ограничения',icon:'fa-user-shield',hint:'Формат: .xlsx, .csv'}].map(f=>`
        <div class="drop-zone ${files[f.key]?'border-green-400 bg-green-50':''}" id="drop-${f.key}" onclick="document.getElementById('file-${f.key}').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'${f.key}')">
          <input type="file" id="file-${f.key}" class="hidden" accept=".xlsx,.csv" onchange="handleFile(this,'${f.key}')">
          ${files[f.key]?`<div class="text-green-600 text-3xl mb-2"><i class="fas fa-check-circle"></i></div><div class="font-600 text-green-700 text-sm">${files[f.key]}</div>`:`<div class="text-gray-400 text-3xl mb-2"><i class="fas ${f.icon}"></i></div><div class="font-600 text-sm mb-1">${f.label}</div><div class="text-xs text-gray-400">${f.hint}</div><div class="text-xs text-gray-400 mt-2">Перетащите или нажмите</div>`}
        </div>`).join('')}
      </div>
    </div>
    <div class="card p-5 sm:p-6 fade-up fade-up-d1">
      <h3 class="text-lg font-700 mb-5">Настройки алгоритма генерации</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">${[{key:'balance',label:'Балансировка нагрузки',desc:'Равномерное распределение пар по дням'},{key:'compactness',label:'Компактность',desc:'Минимизация окон между парами'},{key:'gaps',label:'Минимизация разрывов',desc:'Сокращение пустых слотов в аудиториях'}].map(s=>`
        <div><div class="flex justify-between mb-1"><span class="font-600 text-sm">${s.label}</span><span class="text-sm text-primary font-700" id="val-${s.key}">${State.algoSettings[s.key]}%</span></div><p class="text-xs text-gray-400 mb-3">${s.desc}</p><input type="range" class="slider-custom" min="0" max="100" value="${State.algoSettings[s.key]}" oninput="State.algoSettings['${s.key}']=+this.value;document.getElementById('val-${s.key}').textContent=this.value+'%'"></div>`).join('')}
      </div>
      <div class="mt-6 flex flex-col sm:flex-row gap-3 sm:items-center"><button class="btn-grad" onclick="runGeneration()"><i class="fas fa-magic mr-2"></i>Сгенерировать расписание</button><span class="text-sm text-gray-400" id="genStatus">${State.scheduleGenerated?'Расписание сгенерировано':'Данные не сгенерированы'}</span></div>
    </div>
    <div class="card p-5 sm:p-6 fade-up fade-up-d2">
      <div class="flex flex-col gap-4 mb-5">
        <h3 class="text-lg font-700">Расписание</h3>
        <div class="flex flex-wrap gap-2">
          <select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="scheduleViewType" onchange="State.scheduleFilter=this.value;refreshSchedule()"><option value="group" ${State.scheduleFilter==='group'?'selected':''}>По группам</option><option value="teacher" ${State.scheduleFilter==='teacher'?'selected':''}>По преподавателям</option><option value="room" ${State.scheduleFilter==='room'?'selected':''}>По аудиториям</option></select>
          <select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="scheduleViewId" onchange="State.scheduleFilterId=+this.value;refreshSchedule()">${getScheduleOptions()}</select>
          <button class="btn-outline text-sm !px-4 whitespace-nowrap" onclick="toast('Расписание экспортировано в Excel','success')"><i class="fas fa-file-excel mr-1"></i>Экспорт</button>
          <button class="btn-grad text-sm !px-4 whitespace-nowrap" onclick="toast('Расписание утверждено','success')"><i class="fas fa-check mr-1"></i>Утвердить</button>
        </div>
      </div>
      <div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm" style="min-width:800px"><thead><tr class="text-left text-gray-400 border-b border-gray-100"><th class="pb-3 font-600 w-32 pl-4 sm:pl-0">Время</th>${DAYS.map(d=>`<th class="pb-3 font-600 text-center">${d}</th>`).join('')}</tr></thead><tbody id="scheduleBody">${buildScheduleRows()}</tbody></table></div>
    </div>
  </div><div id="scheduleSidePanel"></div>`;
}
function getScheduleOptions(){if(State.scheduleFilter==='group') return DB.groups.map(g=>`<option value="${g.id}" ${State.scheduleFilterId===g.id?'selected':''}>${g.name}</option>`).join('');if(State.scheduleFilter==='teacher') return DB.teachers.map(t=>`<option value="${t.id}" ${State.scheduleFilterId===t.id?'selected':''}>${t.name.split(' ').slice(0,2).join(' ')}</option>`).join('');return DB.rooms.map(r=>`<option value="${r.id}" ${State.scheduleFilterId===r.id?'selected':''}>${r.name}</option>`).join('');}
function buildScheduleRows(){return SLOTS.map(sl=>{const cells=DAYS.map((_,di)=>{const ev=DB.events.find(e=>{if(State.scheduleFilter==='group') return e.groupId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;if(State.scheduleFilter==='teacher') return e.teacherId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;return e.roomId===State.scheduleFilterId&&e.day===di&&e.slot===sl.id;});if(!ev) return `<td class="py-1 px-1"><div class="schedule-cell bg-gray-50 text-gray-300 text-center" style="min-height:60px;border-left:4px solid transparent">—</div></td>`;const disc=getDisc(ev.disciplineId),grp=getGroup(ev.groupId),tch=getTeacher(ev.teacherId),rm=getRoom(ev.roomId);let info='';if(State.scheduleFilter==='group') info=`${rm?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;else if(State.scheduleFilter==='teacher') info=`${grp?.name||''}<br><span class="text-gray-500">${rm?.name||''}</span>`;else info=`${grp?.name||''}<br><span class="text-gray-500">${tch?.name?.split(' ')[0]||''}</span>`;return `<td class="py-1 px-1"><div class="schedule-cell ${TYPE_COLOR[ev.type]||''} ${ev.conflict?'conflict':''}" onclick="openEventPanel(${ev.id})"><div class="font-600 text-xs leading-tight mb-0.5">${disc?.name||'—'}</div><div class="text-xs leading-tight opacity-80">${info}</div><div class="text-xs mt-1 opacity-60">${TYPE_MAP[ev.type]||''}</div>${ev.held?'<div class="text-xs text-green-600 mt-0.5"><i class="fas fa-check"></i> Проведено</div>':''}</div></td>`;}).join('');return `<tr class="border-b border-gray-50"><td class="py-1 pr-3 font-600 text-xs text-gray-500 whitespace-nowrap align-top pt-3 pl-4 sm:pl-0">${sl.time}</td>${cells}</tr>`;}).join('');}
function refreshSchedule(){const pc=$('#pageContent');if(!pc)return;pc.innerHTML=renderSchedule();}

function openEventPanel(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const disc=getDisc(ev.disciplineId),grp=getGroup(ev.groupId),tch=getTeacher(ev.teacherId),rm=getRoom(ev.roomId);showModal(`<div class="flex items-center justify-between mb-6"><h3 class="text-lg font-800">${disc?.name}</h3><button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center"><i class="fas fa-times text-gray-400"></i></button></div><div class="space-y-3 text-sm"><div class="flex justify-between"><span class="text-gray-500">Тип</span><span class="font-600">${TYPE_MAP[ev.type]}</span></div><div class="flex justify-between"><span class="text-gray-500">День / Время</span><span class="font-600 text-right ml-2">${DAYS[ev.day]}, ${SLOTS[ev.slot-1].time}</span></div><div class="flex justify-between"><span class="text-gray-500">Группа</span><span class="font-600">${grp?.name}</span></div><div class="flex justify-between"><span class="text-gray-500">Преподаватель</span><span class="font-600 text-right ml-2">${tch?.name}</span></div><div class="flex justify-between"><span class="text-gray-500">Аудитория</span><span class="font-600">${rm?.name} (${rm?.capacity} мест)</span></div><div class="flex justify-between items-center"><span class="text-gray-500">Статус</span><span class="status-badge ${ev.conflict?'status-red':'status-green'}">${ev.conflict?'Конфликт':'Норма'}</span></div></div><div class="mt-6 space-y-3"><div><label class="block text-sm font-600 mb-1.5">Перенести в аудиторию</label><select class="input-field" id="moveRoomSelect">${DB.rooms.filter(r=>r.id!==ev.roomId).map(r=>`<option value="${r.id}">${r.name} (${r.capacity} мест)</option>`).join('')}</select></div><div class="flex gap-3"><button class="btn-grad flex-1 text-sm" onclick="moveEvent(${ev.id})"><i class="fas fa-exchange-alt mr-1"></i>Перенести</button><button class="btn-outline flex-1 text-sm" onclick="toggleHeld(${ev.id})" style="${ev.held?'border-color:#059669;color:#059669':''}"><i class="fas fa-${ev.held?'undo':'check'} mr-1"></i>${ev.held?'Отменить':'Проведено'}</button></div></div>`);}
function moveEvent(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const sel=$('#moveRoomSelect');if(!sel)return;ev.roomId=+sel.value;ev.conflict=false;closeModal();refreshSchedule();toast('Занятие перенесено','success');}
function toggleHeld(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;ev.held=!ev.held;closeModal();refreshSchedule();toast(ev.held?'Отмечено':'Отметка снята','info');}
function handleFile(input,key){if(input.files.length){State.uploadedFiles[key]=input.files[0].name;refreshSchedule();toast('Файл загружен: '+input.files[0].name,'success')}}
function handleDrop(e,key){e.preventDefault();e.currentTarget.classList.remove('dragover');if(e.dataTransfer.files.length){State.uploadedFiles[key]=e.dataTransfer.files[0].name;refreshSchedule();toast('Файл загружен','success')}}
function runGeneration(){const ov=document.createElement('div');ov.className='gen-overlay';ov.id='genOverlay';ov.innerHTML=`<div class="gen-spinner"></div><div class="text-lg font-700">Генерация расписания</div><div class="text-sm text-gray-500" id="genStep">Анализ учебных планов...</div>`;document.body.appendChild(ov);const steps=['Анализ учебных планов...','Проверка ограничений...','Распределение по аудиториям...','Оптимизация нагрузки...','Финальная проверка...'];let i=0;const iv=setInterval(()=>{i++;const st=$('#genStep');if(st)st.textContent=steps[Math.min(i,steps.length-1)];if(i>=steps.length){clearInterval(iv);setTimeout(()=>{generateSchedule();const o=$('#genOverlay');if(o)o.remove();refreshSchedule();const gs=$('#genStatus');if(gs)gs.innerHTML='<span class="text-green-600 font-600"><i class="fas fa-check-circle mr-1"></i>Сгенерировано ('+DB.events.length+' занятий)</span>';toast('Расписание сгенерировано','success')},500)}},700);}

/* ========== АУДИТОРНЫЙ ФОНД ========== */
function renderRooms(){
  return `<div class="space-y-6">
    <div class="flex flex-col gap-4">
      <div class="flex gap-2 flex-wrap"><select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="roomBuildingFilter" onchange="filterRooms()"><option value="">Все корпуса</option>${DB.buildings.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select><select class="input-field !w-full sm:!w-auto" style="padding:8px 14px;font-size:13px" id="roomTypeFilter" onchange="filterRooms()"><option value="">Все типы</option><option value="lecture">Лекционные</option><option value="practice">Практические</option><option value="lab">Лаборатории</option><option value="computer">Комп. классы</option></select><input class="input-field !w-full sm:!w-48" style="padding:8px 14px;font-size:13px" placeholder="Поиск..." id="roomSearch" oninput="filterRooms()"></div>
      <div class="flex gap-2"><button class="btn-grad text-sm !px-4" onclick="showAddRoomModal()"><i class="fas fa-plus mr-1"></i>Добавить</button><button class="btn-outline text-sm !px-4" onclick="toast('Импорт аудиторий из файла','info')"><i class="fas fa-file-import mr-1"></i>Импорт</button></div>
    </div>
    <div class="card overflow-hidden fade-up"><div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm min-w-[800px]"><thead><tr class="text-left text-gray-400 bg-gray-50 border-b border-gray-100"><th class="p-4 font-600 pl-4 sm:pl-4">Аудитория</th><th class="p-4 font-600">Корпус</th><th class="p-4 font-600">Этаж</th><th class="p-4 font-600">Вместимость</th><th class="p-4 font-600">Тип</th><th class="p-4 font-600">Оборудование</th><th class="p-4 font-600">Загрузка</th><th class="p-4 font-600 pr-4">Действия</th></tr></thead><tbody id="roomsTableBody">${buildRoomsRows(DB.rooms)}</tbody></table></div></div>
  </div>`;
}
function buildRoomsRows(rooms){return rooms.map(r=>{const b=getBuilding(r.buildingId);const events=DB.events.filter(e=>e.roomId===r.id);const load=Math.round((events.length/6)*100);return `<tr class="table-row border-b border-gray-50"><td class="p-4 font-700 pl-4 sm:pl-4">${r.name}</td><td class="p-4 text-gray-500">${b?.name||'—'}</td><td class="p-4">${r.floor}</td><td class="p-4">${r.capacity}</td><td class="p-4"><span class="status-badge ${r.type==='lecture'?'status-orange':r.type==='lab'?'status-red':'status-green'}">${r.type==='lecture'?'Лекционная':r.type==='practice'?'Практическая':r.type==='lab'?'Лаборатория':'Комп. класс'}</span></td><td class="p-4 text-gray-500 text-xs">${r.equipment.join(', ')}</td><td class="p-4"><div class="flex items-center gap-2"><div class="w-16 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${load}%;background:${load<=40?'#22C55E':load<=70?'#F59E0B':'#EF4444'}"></div></div><span class="text-xs font-600">${load}%</span></div></td><td class="p-4 pr-4"><button onclick="showRoomDetail(${r.id})" class="text-primary hover:underline text-xs font-600">Детали</button></td></tr>`;}).join('');}
function filterRooms(){const bF=$('#roomBuildingFilter')?.value||'';const tF=$('#roomTypeFilter')?.value||'';const sF=($('#roomSearch')?.value||'').toLowerCase();let filtered=DB.rooms;if(bF)filtered=filtered.filter(r=>r.buildingId===+bF);if(tF)filtered=filtered.filter(r=>r.type===tF);if(sF)filtered=filtered.filter(r=>r.name.toLowerCase().includes(sF));const tb=$('#roomsTableBody');if(tb)tb.innerHTML=buildRoomsRows(filtered);}
function showAddRoomModal(){showModal(`<h3 class="text-lg font-800 mb-5">Добавить аудиторию</h3><div class="space-y-4"><div><label class="block text-sm font-600 mb-1">Название</label><input class="input-field" id="newRoomName" placeholder="Г-301"></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-600 mb-1">Корпус</label><select class="input-field" id="newRoomBuilding">${DB.buildings.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div><div><label class="block text-sm font-600 mb-1">Этаж</label><input class="input-field" id="newRoomFloor" type="number" min="1" value="1"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-600 mb-1">Вместимость</label><input class="input-field" id="newRoomCap" type="number" min="1" value="30"></div><div><label class="block text-sm font-600 mb-1">Тип</label><select class="input-field" id="newRoomType"><option value="practice">Практическая</option><option value="lecture">Лекционная</option><option value="lab">Лаборатория</option><option value="computer">Комп. класс</option></select></div></div><button class="btn-grad w-full" onclick="addRoom()">Добавить</button></div>`);}
function addRoom(){const name=$('#newRoomName')?.value;const bid=+$('#newRoomBuilding')?.value;const floor=+$('#newRoomFloor')?.value;const cap=+$('#newRoomCap')?.value;const type=$('#newRoomType')?.value;if(!name){toast('Укажите название','error');return}DB.rooms.push({id:DB.rooms.length+1,name,buildingId:bid,floor,capacity:cap,type,equipment:[]});closeModal();navigate('/rooms');toast('Аудитория '+name+' добавлена','success');}
function showRoomDetail(id){const r=getRoom(id);if(!r)return;const b=getBuilding(r.buildingId);const events=DB.events.filter(e=>e.roomId===id);showModal(`<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-800">${r.name}</h3><button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center"><i class="fas fa-times text-gray-400"></i></button></div><div class="grid grid-cols-2 gap-3 text-sm mb-5"><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Корпус</div><div class="font-600">${b?.name}</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Этаж</div><div class="font-600">${r.floor}</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Вместимость</div><div class="font-600">${r.capacity} мест</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Тип</div><div class="font-600">${TYPE_MAP[r.type]||r.type}</div></div></div><div class="text-sm mb-2 font-600">Оборудование</div><div class="flex flex-wrap gap-2 mb-5">${r.equipment.map(e=>`<span class="px-3 py-1 bg-gray-100 rounded-lg text-xs font-500">${e}</span>`).join('')||'<span class="text-gray-400 text-sm">Не указано</span>'}</div><div class="text-sm mb-2 font-600">Занятия (${events.length})</div><div class="space-y-2 max-h-40 overflow-y-auto">${events.slice(0,10).map(e=>{const d=getDisc(e.disciplineId),g=getGroup(e.groupId);return `<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between bg-gray-50 rounded-lg px-3 py-2 text-xs gap-1"><span class="font-600">${d?.name}</span><span class="text-gray-500">${DAYS[e.day]} ${SLOTS[e.slot-1].time} — ${g?.name}</span></div>`;}).join('')}</div>`);}

/* ========== ПРЕПОДАВАТЕЛИ И ГРУППЫ ========== */
function renderPeople(){const isTeachers=State.peopleTab==='teachers';return `<div class="space-y-6"><div class="flex gap-2 overflow-x-auto pb-2"><button class="tab-btn ${isTeachers?'active':''}" onclick="State.peopleTab='teachers';navigate('/people')">Преподаватели (${DB.teachers.length})</button><button class="tab-btn ${!isTeachers?'active':''}" onclick="State.peopleTab='groups';navigate('/people')">Группы (${DB.groups.length})</button></div>${isTeachers?`<div class="card overflow-hidden fade-up"><div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm min-w-[700px]"><thead><tr class="text-left text-gray-400 bg-gray-50 border-b border-gray-100"><th class="p-4 font-600 pl-4 sm:pl-4">ФИО</th><th class="p-4 font-600">Кафедра</th><th class="p-4 font-600">Макс. часов</th><th class="p-4 font-600">Нагрузка</th><th class="p-4 font-600">Ограничения</th><th class="p-4 font-600 pr-4">Действия</th></tr></thead><tbody>${DB.teachers.map(t=>{const hours=DB.events.filter(e=>e.teacherId===t.id).length*2;const load=Math.round((hours/t.maxHours)*100);return `<tr class="table-row border-b border-gray-50"><td class="p-4 font-600 pl-4 sm:pl-4">${t.name}</td><td class="p-4 text-gray-500">${t.dept}</td><td class="p-4">${t.maxHours} ч/нед</td><td class="p-4"><div class="flex items-center gap-2"><div class="w-16 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${Math.min(load,100)}%;background:${load<=80?'#22C55E':load<=100?'#F59E0B':'#EF4444'}"></div></div><span class="text-xs font-600">${hours}ч</span></div></td><td class="p-4 text-xs text-gray-500">${t.restrictions.length?t.restrictions.map(r=>'Пара '+r).join(', '):'—'}</td><td class="p-4 pr-4"><button onclick="showTeacherDetail(${t.id})" class="text-primary hover:underline text-xs font-600">Детали</button></td></tr>`;}).join('')}</tbody></table></div></div>`:`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 fade-up">${DB.groups.map(g=>{const events=DB.events.filter(e=>e.groupId===g.id);const discs=[...new Set(events.map(e=>getDisc(e.disciplineId)?.name).filter(Boolean))];return `<div class="card p-6"><div class="flex items-center justify-between mb-4"><div class="w-12 h-12 grad-bg rounded-xl flex items-center justify-center text-white font-800">${g.name.split('-')[0]}</div><span class="status-badge status-green">${g.course} курс</span></div><div class="font-700 text-lg mb-1">${g.name}</div><div class="flex gap-4 text-sm"><div><span class="text-gray-400">Студ:</span> <span class="font-600">${g.students}</span></div><div><span class="text-gray-400">Пар:</span> <span class="font-600">${events.length}</span></div></div><div class="mt-3 text-xs text-gray-400">Дисц.: ${discs.slice(0,3).join(', ')}${discs.length>3?'...':''}</div></div>`;}).join('')}</div>`}</div>`;}
function showTeacherDetail(id){const t=getTeacher(id);if(!t)return;const events=DB.events.filter(e=>e.teacherId===id);const hours=events.length*2;showModal(`<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-800">${t.name}</h3><button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center"><i class="fas fa-times text-gray-400"></i></button></div><div class="grid grid-cols-2 gap-3 text-sm mb-5"><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Кафедра</div><div class="font-600">${t.dept}</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Телефон</div><div class="font-600">${t.phone}</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Нагрузка</div><div class="font-600">${hours} / ${t.maxHours} ч</div></div><div class="bg-gray-50 rounded-xl p-3"><div class="text-gray-400 text-xs mb-1">Ограничения</div><div class="font-600">${t.restrictions.length?t.restrictions.map(r=>'Пара '+r).join(', '):'Нет'}</div></div></div><div class="text-sm mb-2 font-600">Расписание (${events.length} пар)</div><div class="space-y-2 max-h-48 overflow-y-auto">${events.map(e=>{const d=getDisc(e.disciplineId),g=getGroup(e.groupId),r=getRoom(e.roomId);return `<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between bg-gray-50 rounded-lg px-3 py-2 text-xs gap-1"><span class="font-600">${d?.name} (${g?.name})</span><span class="text-gray-500">${DAYS[e.day]} ${SLOTS[e.slot-1].time} — ${r?.name}</span></div>`;}).join('')}</div>`);}

/* ========== АНАЛИТИКА ========== */
function renderAnalytics(){return `<div class="space-y-6"><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-5 sm:p-6 fade-up"><h3 class="text-lg font-700 mb-4">Загрузка по корпусам</h3><div class="w-full"><canvas id="chartBuildings" height="260"></canvas></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d1"><h3 class="text-lg font-700 mb-4">Загрузка по типам</h3><div class="w-full"><canvas id="chartTypes" height="260"></canvas></div></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d2"><h3 class="text-lg font-700 mb-4">Загрузка по дням недели</h3><div class="w-full"><canvas id="chartDays" height="200"></canvas></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d3"><div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5"><h3 class="text-lg font-700">Простаивающие аудитории</h3><button class="btn-grad text-sm !px-4 whitespace-nowrap" onclick="toast('Отчёт PDF сформирован','success')"><i class="fas fa-file-pdf mr-1"></i>PDF Отчёт</button></div><div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm min-w-[500px]"><thead><tr class="text-left text-gray-400 bg-gray-50 border-b border-gray-100"><th class="p-4 font-600 pl-4 sm:pl-4">Аудитория</th><th class="p-4 font-600">Корпус</th><th class="p-4 font-600">Этаж</th><th class="p-4 font-600">Вместимость</th><th class="p-4 font-600 pr-4">Тип</th></tr></thead><tbody>${DB.rooms.filter(r=>!DB.events.some(e=>e.roomId===r.id)).length?DB.rooms.filter(r=>!DB.events.some(e=>e.roomId===r.id)).map(r=>{const b=getBuilding(r.buildingId);return `<tr class="table-row border-b border-gray-50"><td class="p-4 font-600 pl-4 sm:pl-4">${r.name}</td><td class="p-4 text-gray-500">${b?.name}</td><td class="p-4">${r.floor}</td><td class="p-4">${r.capacity}</td><td class="p-4 pr-4">${r.type==='lecture'?'Лекционная':r.type==='practice'?'Практическая':r.type==='lab'?'Лаборатория':'Комп. класс'}</td></tr>`;}).join(''):`<tr><td colspan="5" class="p-8 text-center text-gray-400">Все аудитории задействованы</td></tr>`}</tbody></table></div></div></div>`;}
function initAnalytics(){const colors=['#2563EB','#7C3AED','#D97706'];const ctx1=document.getElementById('chartBuildings')?.getContext('2d');if(ctx1) new Chart(ctx1,{type:'bar',data:{labels:DB.buildings.map(b=>b.name),datasets:[{label:'Загрузка %',data:DB.buildings.map(b=>{const rooms=DB.rooms.filter(r=>r.buildingId===b.id);const ev=DB.events.filter(e=>rooms.some(r=>r.id===e.roomId));return Math.round((ev.length/(rooms.length*36))*100)}),backgroundColor:colors,borderRadius:8,barThickness:48}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}});const ctx2=document.getElementById('chartTypes')?.getContext('2d');if(ctx2) new Chart(ctx2,{type:'doughnut',data:{labels:['Лекционные','Практические','Лаборатории'],datasets:[{data:['lecture','practice','lab'].map(t=>{const rooms=DB.rooms.filter(r=>r.type===t);return DB.events.filter(e=>rooms.some(r=>r.id===e.roomId)).length}),backgroundColor:colors,borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:16,usePointStyle:true,pointStyleWidth:10}}}}});const ctx3=document.getElementById('chartDays')?.getContext('2d');if(ctx3) new Chart(ctx3,{type:'line',data:{labels:DAYS,datasets:[{label:'Количество пар',data:DAYS.map((_,di)=>DB.events.filter(e=>e.day===di).length),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.1)',fill:true,tension:.4,pointBackgroundColor:'#2563EB',pointRadius:5,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true},x:{grid:{display:false}}}}});}

/* ========== БРОНИРОВАНИЕ ========== */
function renderBookings(){const statusMap={pending:{text:'На рассмотрении',cls:'status-orange'},approved:{text:'Одобрено',cls:'status-green'},rejected:{text:'Отклонено',cls:'status-red'}};return `<div class="space-y-6"><div class="card p-5 sm:p-6 fade-up"><h3 class="text-lg font-700 mb-5">Новая заявка</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4"><div><label class="block text-sm font-600 mb-1">Аудитория</label><select class="input-field" id="bkRoom">${DB.rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select></div><div><label class="block text-sm font-600 mb-1">Дата</label><input class="input-field" id="bkDate" type="date" value="2025-02-17"></div><div><label class="block text-sm font-600 mb-1">Пара</label><select class="input-field" id="bkSlot">${SLOTS.map(s=>`<option value="${s.id}">${s.time}</option>`).join('')}</select></div><div><label class="block text-sm font-600 mb-1">Заявитель</label><input class="input-field" id="bkRequester" placeholder="ФИО или подразделение"></div></div><div class="mb-4"><label class="block text-sm font-600 mb-1">Цель</label><input class="input-field" id="bkPurpose" placeholder="Описание мероприятия"></div><button class="btn-grad" onclick="submitBooking()"><i class="fas fa-paper-plane mr-1"></i>Подать заявку</button></div><div class="card p-5 sm:p-6 fade-up fade-up-d1"><h3 class="text-lg font-700 mb-4">Доступность аудитории</h3><div class="grid grid-cols-3 sm:grid-cols-6 gap-2" id="availGrid">${SLOTS.map(sl=>{const events=DB.events.filter(e=>e.slot===sl.id);return `<div class="text-center"><div class="text-xs font-600 text-gray-500 mb-2 truncate">${sl.time.split('—')[0].trim()}</div>${DAYS.map((d,di)=>{const occupied=events.some(e=>e.day===di);return `<div class="w-full aspect-square rounded-lg text-xs flex items-center justify-center font-600 ${occupied?'bg-red-100 text-red-600':'bg-green-100 text-green-600'}" title="${d}: ${occupied?'Занято':'Свободно'}">${d}</div>`;}).join('')}</div>`;}).join('')}</div></div><div class="card p-5 sm:p-6 fade-up fade-up-d2"><h3 class="text-lg font-700 mb-5">Заявки</h3><div class="overflow-x-auto -mx-4 sm:mx-0"><table class="w-full text-sm min-w-[600px]"><thead><tr class="text-left text-gray-400 bg-gray-50 border-b border-gray-100"><th class="p-4 font-600 pl-4 sm:pl-4">Аудитория</th><th class="p-4 font-600">Дата</th><th class="p-4 font-600">Время</th><th class="p-4 font-600">Цель</th><th class="p-4 font-600">Заявитель</th><th class="p-4 font-600">Статус</th><th class="p-4 font-600 pr-4">Действия</th></tr></thead><tbody>${DB.bookings.map(b=>{const r=getRoom(b.roomId);const st=statusMap[b.status];return `<tr class="table-row border-b border-gray-50"><td class="p-4 font-600 pl-4 sm:pl-4">${r?.name||'—'}</td><td class="p-4 text-gray-500">${b.date}</td><td class="p-4 text-gray-500">${SLOTS[b.timeSlot-1]?.time||'—'}</td><td class="p-4">${b.purpose}</td><td class="p-4 text-gray-500">${b.requester}</td><td class="p-4"><span class="status-badge ${st.cls}">${st.text}</span></td><td class="p-4 pr-4 flex gap-2 flex-wrap">${b.status==='pending'?`<button onclick="approveBooking(${b.id})" class="text-green-600 hover:underline text-xs font-600">Одобрить</button><button onclick="rejectBooking(${b.id})" class="text-red-500 hover:underline text-xs font-600">Отклонить</button>`:'—'}</td></tr>`;}).join('')}</tbody></table></div></div></div>`;}
function submitBooking(){const room=+$('#bkRoom')?.value,date=$('#bkDate')?.value,slot=+$('#bkSlot')?.value,requester=$('#bkRequester')?.value,purpose=$('#bkPurpose')?.value;if(!requester||!purpose){toast('Заполните все поля','error');return}DB.bookings.push({id:DB.bookings.length+1,roomId:room,date,timeSlot:slot,purpose,status:'pending',requester});navigate('/bookings');toast('Заявка подана','success');}
function approveBooking(id){const b=DB.bookings.find(x=>x.id===id);if(b)b.status='approved';navigate('/bookings');toast('Заявка одобрена','success')}
function rejectBooking(id){const b=DB.bookings.find(x=>x.id===id);if(b)b.status='rejected';navigate('/bookings');toast('Заявка отклонена','info')}

/* ========== НАСТРОЙКИ ========== */
function renderSettings(){return `<div class="space-y-6 max-w-3xl"><div class="card p-5 sm:p-6 fade-up"><h3 class="text-lg font-700 mb-5">Профиль вуза</h3><div class="space-y-4"><div><label class="block text-sm font-600 mb-1">Полное название</label><input class="input-field" value="${DB.university.name}"></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="block text-sm font-600 mb-1">Сокращённое название</label><input class="input-field" value="${DB.university.short}"></div><div><label class="block text-sm font-600 mb-1">Ректор</label><input class="input-field" value="${DB.university.rector}"></div></div><button class="btn-grad" onclick="toast('Профиль сохранён','success')">Сохранить изменения</button></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d1"><h3 class="text-lg font-700 mb-5">Интеграции и API</h3><div class="space-y-4"><div><div class="flex items-center justify-between mb-1"><label class="text-sm font-600">1С:Университет</label><span class="status-badge status-green">Подключено</span></div><div class="flex gap-2"><input class="input-field flex-1" value="sk-1c-a8f3...d92e" readonly><button class="btn-outline text-xs !px-4" onclick="toast('Ключ скопирован','info')"><i class="fas fa-copy"></i></button></div></div><div><div class="flex items-center justify-between mb-1"><label class="text-sm font-600">Moodle</label><span class="status-badge status-orange">Ожидает</span></div><div class="flex gap-2"><input class="input-field flex-1" placeholder="Введите API-токен Moodle"><button class="btn-outline text-xs !px-4">Подключить</button></div></div></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d2"><h3 class="text-lg font-700 mb-5">Синхронизация календарей</h3><div class="space-y-4"><div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl gap-4"><div class="flex items-center gap-3"><i class="fab fa-google text-xl" style="color:#4285F4"></i><div><div class="font-600 text-sm">Google Calendar</div><div class="text-xs text-gray-400">Экспорт в Google Календарь</div></div></div><button class="btn-outline text-xs !px-4 whitespace-nowrap" onclick="toast('Ссылка скопирована','success')">Подключить</button></div><div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl gap-4"><div class="flex items-center gap-3"><i class="fas fa-calendar-alt text-xl text-orange-500"></i><div><div class="font-600 text-sm">iCal (.ics)</div><div class="text-xs text-gray-400">Импорт в любой календарь</div></div></div><button class="btn-outline text-xs !px-4 whitespace-nowrap" onclick="toast('Файл .ics скачан','success')">Скачать</button></div></div></div><div class="card p-5 sm:p-6 fade-up fade-up-d3"><div class="flex items-center justify-between mb-5"><h3 class="text-lg font-700">Управление пользователями</h3><button class="btn-grad text-sm !px-4" onclick="toast('Приглашение отправлено','success')"><i class="fas fa-user-plus mr-1"></i>Пригласить</button></div><div class="space-y-3">${[{name:'Администратор',email:'admin@agmu.ru',role:'Админ',active:true},{name:'Смирнова Е.К.',email:'smirnova@agmu.ru',role:'Диспетчер',active:true},{name:'Кузнецов И.П.',email:'kuznetsov@agmu.ru',role:'Диспетчер',active:false}].map(u=>`<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl gap-4"><div class="flex items-center gap-3 min-w-0"><div class="w-10 h-10 rounded-full grad-bg flex items-center justify-center text-white font-700 text-sm flex-shrink-0">${u.name[0]}</div><div class="min-w-0"><div class="font-600 text-sm truncate">${u.name}</div><div class="text-xs text-gray-400 truncate">${u.email}</div></div></div><div class="flex items-center gap-3 flex-shrink-0"><span class="status-badge ${u.active?'status-green':'status-red'} hidden sm:inline-block">${u.active?'Активен':'Заблокирован'}</span><span class="text-xs text-gray-400 bg-white px-2 py-1 rounded-lg">${u.role}</span></div></div>`).join('')}</div></div></div>`;}

/* ========== ГЛОБАЛЬНЫЕ ОБРАБОТЧИКИ ========== */
function attachGlobalEvents(){document.getElementById('authForm')?.addEventListener('submit',function(e){e.preventDefault();const email=$('#authEmail')?.value;const pass=$('#authPass')?.value;if(State.page==='/register'){const pass2=$('#authPass2')?.value;if(pass!==pass2){toast('Пароли не совпадают','error');return}DB.users.push({id:DB.users.length+1,email,password:pass,name:$('#authName')?.value||'Пользователь',role:'admin'});toast('Регистрация успешна','success');navigate('/login');return}const user=DB.users.find(u=>u.email===email&&u.password===pass);if(!user){toast('Неверный email или пароль','error');return}State.user=user;navigate('/dashboard');});}

/* ========== ИНИЦИАЛИЗАЦИЯ ========== */
window.addEventListener('DOMContentLoaded', getApp);
</script>
